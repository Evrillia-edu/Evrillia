<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">

  <defs>
    <linearGradient id="coffee" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>
  </defs>

  <!-- Card -->
  <rect x="10" y="10" width="680" height="160"
        rx="20"
        fill="#FFF8FC"
        stroke="#F8C4DA"
        stroke-width="3"/>

  <!-- Cup -->
  <rect x="50" y="60"
        width="55"
        height="55"
        rx="8"
        fill="#FFFFFF"/>

  <path d="M105 72 Q122 72 122 88 Q122 104 105 104"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="6"/>

  <!-- Steam -->
  <path d="M65 55 C58 40 72 35 65 20"
        fill="none"
        stroke="#F8AFCB"
        stroke-width="3"/>

  <path d="M88 55 C82 40 95 35 88 20"
        fill="none"
        stroke="#F8AFCB"
        stroke-width="3"/>

  <!-- Title -->
  <text x="150"
        y="60"
        font-size="24"
        font-family="Verdana"
        font-weight="bold"
        fill="#D86C9A">
        ☕ Coffee Energy
  </text>

 <text
      x="150"
      y="90"
      font-size="15"
      font-family="Verdana"
      fill="#8E6A79">
      Powered by coffee &amp; curiosity
</text>

  <!-- Progress -->
  <rect x="150"
        y="118"
        width="450"
        height="18"
        rx="9"
        fill="#FCE4EC"/>

  <rect x="150"
        y="118"
        width="360"
        height="18"
        rx="9"
        fill="url(#coffee)"/>

  <text x="615"
        y="132"
        font-size="15"
        font-family="Verdana"
        fill="#D86C9A">
        80%
  </text>

  <text x="610"
        y="55"
        font-size="18">
        💗
  </text>

</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="700" height="180" viewBox="0 0 700 180">

  <defs>
    <linearGradient id="coffee" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F8BBD0"/>
      <stop offset="100%" stop-color="#F48FB1"/>
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#F6BCD4"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect
      x="10"
      y="10"
      rx="20"
      ry="20"
      width="680"
      height="160"
      fill="#FFF8FC"
      stroke="#F8C4DA"
      stroke-width="3"
      filter="url(#shadow)"/>

  <!-- Coffee -->
  <g transform="translate(45 45)">

    <rect
        width="55"
        height="60"
        rx="8"
        fill="#FFFFFF"/>

    <path
        d="M55 12
           Q75 12 75 30
           Q75 48 55 48"
        fill="none"
        stroke="#FFFFFF"
        stroke-width="6"/>

    <!-- Steam -->
    <path
        d="M18 -8
           C10 -20 25 -25 18 -38"
        stroke="#F8AFCB"
        stroke-width="3"
        fill="none">

      <animateTransform
          attributeName="transform"
          type="translate"
          values="0 0;0 -6;0 0"
          dur="2s"
          repeatCount="indefinite"/>

    </path>

    <path
        d="M36 -8
           C28 -20 43 -25 36 -38"
        stroke="#F8AFCB"
        stroke-width="3"
        fill="none">

      <animateTransform
          attributeName="transform"
          type="translate"
          values="0 0;0 -8;0 0"
          dur="2.3s"
          repeatCount="indefinite"/>

    </path>

  </g>

  <!-- Title -->
  <text
      x="140"
      y="58"
      font-family="Verdana"
      font-size="22"
      font-weight="bold"
      fill="#D86C9A">

      ☕ Coffee Energy

  </text>

  <!-- Subtitle -->
  <text
      x="140"
      y="90"
      font-family="Verdana"
      font-size="16"
      fill="#8E6A79">

      Powered by coffee & curiosity

  </text>

  <!-- Progress Background -->
  <rect
      x="140"
      y="115"
      width="480"
      height="20"
      rx="10"
      fill="#FCE4EC"/>

  <!-- Progress -->
  <rect
      x="140"
      y="115"
      width="390"
      height="20"
      rx="10"
      fill="url(#coffee)">

      <animate
          attributeName="width"
          values="320;390;320"
          dur="3s"
          repeatCount="indefinite"/>

  </rect>

  <!-- Percentage -->
  <text
      x="635"
      y="130"
      text-anchor="end"
      font-family="Verdana"
      font-size="15"
      fill="#D86C9A">

      80%

  </text>

  <!-- Hearts -->
  <text x="610" y="52" font-size="18">

      💗

      <animate
          attributeName="opacity"
          values="0;1;0"
          dur="2s"
          repeatCount="indefinite"/>

  </text>

</svg>
